<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>席予約システム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: "Hiragino Sans", "Noto Sans JP", sans-serif; background: #f4f6f9; color: #333; font-size: 16px; }

  header {
    background: #2c3e50; color: #fff;
    padding: 12px 16px;
    position: sticky; top: 0; z-index: 50;
  }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  header h1 { font-size: 1rem; flex: 1; }
  .header-user { display: flex; align-items: center; gap: 8px; }
  #user-label { font-size: 0.8rem; opacity: .8; white-space: nowrap; }
  #user-input {
    padding: 8px 12px; border-radius: 8px; border: none;
    font-size: 1rem; width: 140px;
    background: rgba(255,255,255,.15); color: #fff;
  }
  #user-input::placeholder { color: rgba(255,255,255,.5); }
  #user-input:focus { outline: 2px solid rgba(255,255,255,.6); background: rgba(255,255,255,.2); }
  .header-status { font-size: .78rem; opacity: .7; }
  .header-date { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .date-nav { background: rgba(255,255,255,.2); border: none; color: #fff;
    font-size: 1.1rem; padding: 4px 10px; border-radius: 6px; cursor: pointer; }
  .date-nav:active { background: rgba(255,255,255,.35); }
  #date-display { font-size: .9rem; font-weight: bold; flex: 1; text-align: center; }
  #date-input { opacity: 0; position: absolute; width: 1px; height: 1px; }

  .container { padding: 12px; }

  /* 自動予約パネル */
  .auto-book-panel {
    background: #fff; border-radius: 14px; padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 16px;
  }
  .auto-book-panel h2 { font-size: 1rem; font-weight: bold; margin-bottom: 14px; color: #2c3e50; }

  .pref-label { font-size: .85rem; color: #555; margin-bottom: 8px; }
  .pref-buttons { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .pref-btn {
    flex: 1; min-width: 80px; padding: 12px 8px;
    border: 2px solid #d1d5db; border-radius: 12px;
    background: #fff; font-size: .9rem; cursor: pointer;
    text-align: center; transition: all .15s;
  }
  .pref-btn.selected {
    border-color: #2c3e50; background: #2c3e50; color: #fff;
  }
  .pref-btn:active { opacity: .8; }

  .time-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .time-field { flex: 1; }
  .time-field label { font-size: .8rem; color: #555; display: block; margin-bottom: 4px; }
  .time-field input {
    width: 100%; padding: 10px 12px;
    border: 1.5px solid #d1d5db; border-radius: 10px;
    font-size: 1rem;
  }
  .time-field input:focus { outline: none; border-color: #2c3e50; }

  .btn-auto-book {
    width: 100%; padding: 16px;
    background: #2c3e50; color: #fff;
    border: none; border-radius: 12px;
    font-size: 1.1rem; font-weight: bold; cursor: pointer;
  }
  .btn-auto-book:active { opacity: .8; }
  .btn-auto-book:disabled { background: #9ca3af; cursor: not-allowed; }

  .legend {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;
    background: #fff; border-radius: 10px; padding: 10px 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: .78rem; }
  .badge { padding: 3px 8px; border-radius: 12px; font-size: .72rem; font-weight: bold; }
  .badge.window   { background: #dcfce7; color: #15803d; }
  .badge.no_phone { background: #dbeafe; color: #1d4ed8; }
  .badge.other    { background: #f3f4f6; color: #6b7280; }
  .badge.free     { background: #f3f4f6; color: #6b7280; }
  .badge.taken    { background: #fee2e2; color: #b91c1c; }
  .badge.mine     { background: #ede9fe; color: #6d28d9; }
  .badge.prev     { background: #fde8d8; color: #9a3412; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .seat {
    background: #fff; border-radius: 14px; padding: 14px 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,.1);
    border: 2px solid transparent;
    transition: transform .1s;
    user-select: none;
  }
  .seat.taken  { border-color: #fca5a5; background: #fff5f5; }
  .seat.mine   { border-color: #a78bfa; background: #faf5ff; }
  .seat.prev   { border-color: #fdba74; background: #fff7ed; }
  .seat-num    { font-size: 1.5rem; font-weight: bold; margin-bottom: 6px; }
  .seat-tags   { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 6px; min-height: 24px; }
  .seat-info   { font-size: .72rem; color: #666; min-height: 1em; }

  /* モーダル：画面下からスライドアップ */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.5); z-index: 100;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 36px;
    width: 100%; max-width: 500px;
    box-shadow: 0 -4px 24px rgba(0,0,0,.2);
  }
  .modal-handle {
    width: 40px; height: 4px; background: #d1d5db;
    border-radius: 2px; margin: 0 auto 16px;
  }
  .modal h2 { font-size: 1.1rem; margin-bottom: 16px; }
  .form-row { margin-bottom: 16px; }
  .form-row label { display: block; font-size: .85rem; margin-bottom: 6px; color: #555; }
  .form-row input {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid #d1d5db; border-radius: 10px;
    font-size: 1.1rem;
  }
  .form-row input:focus { outline: none; border-color: #6d28d9; }
  .btn-row { display: flex; gap: 10px; margin-top: 8px; }
  .btn {
    flex: 1; padding: 14px; border: none; border-radius: 12px;
    font-size: 1rem; cursor: pointer; font-weight: bold;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { opacity: .8; }
  .btn-primary { background: #2c3e50; color: #fff; }
  .btn-cancel-booking { background: #ef4444; color: #fff; }
  .btn-close  { background: #e5e7eb; color: #333; }

  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #1f2937; color: #fff; padding: 12px 22px; border-radius: 10px;
    font-size: .9rem; opacity: 0; transition: opacity .3s; pointer-events: none;
    z-index: 200; white-space: nowrap; max-width: 90vw; text-align: center;
  }
  #toast.show { opacity: 1; }

  #alarm-banner {
    display: none; position: fixed; top: 0; left: 0; right: 0;
    color: #fff; text-align: center;
    padding: 14px 12px; font-size: 1rem; font-weight: bold; z-index: 300;
  }
  #alarm-banner.warn  { display: block; background: #d97706; }
  #alarm-banner.alert { display: block; background: #dc2626; }
  .alarm-actions { display: flex; gap: 8px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
  .alarm-actions button {
    background: #fff; border: none; border-radius: 8px;
    padding: 8px 18px; font-weight: bold; cursor: pointer; font-size: .95rem;
  }
  .alarm-actions .btn-extend { color: #1d4ed8; }
  .alarm-actions .btn-dismiss { color: #555; }


</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>🪑 席予約システム</h1>
    <div class="header-user">
      <span id="user-label">名前：</span>
      <input id="user-input" type="text" placeholder="あなたの名前" maxlength="20">
    </div>
  </div>
  <div class="header-date">
    <button class="date-nav" onclick="shiftDate(-1)">◀</button>
    <span id="date-display" onclick="document.getElementById('date-input').showPicker()"></span>
    <input type="date" id="date-input" onchange="onDateChange(this.value)">
    <button class="date-nav" onclick="shiftDate(1)">▶</button>
  </div>
  <div class="header-status" id="header-status">名前を入力して席を予約してください</div>
</header>

<div id="alarm-banner">
  <div id="alarm-message"></div>
  <div class="alarm-actions">
    <button class="btn-extend" onclick="openExtendModal()">⏰ 延長する</button>
    <button class="btn-dismiss" onclick="dismissAlarm()">閉じる</button>
  </div>
</div>

<div class="container">

  <!-- 自動予約パネル -->
  <div class="auto-book-panel">
    <h2>🎯 自動席割り当て</h2>
    <div class="pref-label">希望する位置を選択してください</div>
    <div class="pref-buttons">
      <button class="pref-btn selected" id="pref-window" onclick="selectPref('window')">🪟 窓際</button>
      <button class="pref-btn" id="pref-no_phone" onclick="selectPref('no_phone')">🔕 電話なし</button>
      <button class="pref-btn" id="pref-other" onclick="selectPref('other')">🎲 おまかせ</button>
    </div>
    <div class="time-row">
      <div class="time-field">
        <label>開始時刻</label>
        <input type="time" id="auto-start-time">
      </div>
      <div class="time-field">
        <label>終了時刻</label>
        <input type="time" id="auto-end-time">
      </div>
    </div>
    <button class="btn-auto-book" id="btn-auto-book" onclick="submitAutoBook()">
      ✨ 席を自動割り当てする
    </button>
  </div>

  <div class="legend">
    <span class="legend-item"><span class="badge window">窓際</span></span>
    <span class="legend-item"><span class="badge no_phone">電話なし</span></span>
    <span class="legend-item"><span class="badge other">おまかせ</span></span>
    <span class="legend-item"><span class="badge taken">予約済</span></span>
    <span class="legend-item"><span class="badge mine">自分</span></span>
    <span class="legend-item"><span class="badge prev">前日使用</span> 連続予約不可</span>
  </div>

  <div id="loading" style="text-align:center;padding:40px;color:#888;font-size:1rem;">
    ⏳ 読み込み中...
  </div>
  <div class="grid" id="seat-grid" style="display:none;"></div>
  <!-- 席追加は管理者画面(/admin)で行います -->
</div>

<!-- キャンセルモーダル -->
<div class="modal-overlay" id="cancel-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>予約をキャンセルしますか？</h2>
    <p id="cancel-info" style="margin-bottom:16px;font-size:.9rem;color:#555;"></p>
    <div class="btn-row">
      <button class="btn btn-cancel-booking" onclick="submitCancel()">キャンセルする</button>
      <button class="btn btn-close" onclick="closeCancelModal()">戻る</button>
    </div>
  </div>
</div>

<!-- 延長モーダル -->
<div class="modal-overlay" id="extend-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>予約を延長する</h2>
    <p id="extend-info" style="margin-bottom:16px;font-size:.9rem;color:#555;"></p>
    <div class="form-row">
      <label>新しい終了時刻</label>
      <input type="time" id="extend-end-time">
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
      <button class="btn btn-close" style="flex:none;padding:10px 16px;" onclick="addMinutes(30)">＋30分</button>
      <button class="btn btn-close" style="flex:none;padding:10px 16px;" onclick="addMinutes(60)">＋1時間</button>
      <button class="btn btn-close" style="flex:none;padding:10px 16px;" onclick="addMinutes(120)">＋2時間</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="submitExtend()">延長する</button>
      <button class="btn btn-close" onclick="closeExtendModal()">閉じる</button>
    </div>
  </div>
</div>


<div id="toast"></div>

<script>
let SEATS = {{ seats | tojson }};
const CATEGORIES = {{ categories | tojson }};
const CAT_CLASS = { window: "window", no_phone: "no_phone", other: "other" };

let bookingsBySeat = {};
let selectedSeat = null;
let selectedBooking = null;
let alarmTimers = {};
let viewDate = todayISO();
let currentPref = "window";
let yesterdaySeatId = null; // 前日使用した席のID

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDateJA(iso) {
  const d = new Date(iso + "T00:00:00");
  const diff = Math.round((d - new Date(todayISO() + "T00:00:00")) / 86400000);
  const label = diff === 0 ? "（今日）" : diff === 1 ? "（明日）" : diff === -1 ? "（昨日）" : "";
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}（${"日月火水木金土"[d.getDay()]}）${label}`;
}
function nowHHMM() {
  return new Date().toTimeString().slice(0, 5);
}
function addHHMM(hhmm, minutes) {
  const [h, m] = hhmm.split(":").map(Number);
  const d = new Date(); d.setHours(h, m + minutes, 0, 0);
  return d.toTimeString().slice(0, 5);
}
function isoAddDays(iso, days) {
  const d = new Date(iso + "T00:00:00");
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

// ---------- 日付ナビゲーション ----------
function setViewDate(iso) {
  viewDate = iso;
  document.getElementById("date-input").value = iso;
  document.getElementById("date-display").textContent = formatDateJA(iso);
  loadBookings();
}
function shiftDate(delta) {
  const d = new Date(viewDate + "T00:00:00");
  d.setDate(d.getDate() + delta);
  setViewDate(d.toISOString().slice(0, 10));
}
function onDateChange(iso) {
  if (iso) setViewDate(iso);
}

// ---------- ユーザー名 ----------
function getUser() { return document.getElementById("user-input").value.trim(); }

// ---------- 希望選択 ----------
function selectPref(pref) {
  currentPref = pref;
  ["window", "no_phone", "other"].forEach(p => {
    document.getElementById("pref-" + p).classList.toggle("selected", p === pref);
  });
}

// ---------- ローディング非表示 ----------
function showGrid() {
  document.getElementById("loading").style.display = "none";
  document.getElementById("seat-grid").style.display = "grid";
}

// ---------- 前日の予約を取得 ----------
async function loadYesterdaySeat(user) {
  if (!user) { yesterdaySeatId = null; return; }
  const yesterday = isoAddDays(viewDate, -1);
  try {
    const res = await fetch("/api/bookings?date=" + yesterday);
    const list = await res.json();
    const mine = list.find(b => b.user === user && !b.cancelled);
    yesterdaySeatId = mine ? mine.seat_id : null;
  } catch(e) {
    yesterdaySeatId = null;
  }
}

// ---------- データ取得 ----------
async function loadBookings() {
  const user = getUser();
  await loadYesterdaySeat(user);
  try {
    const res = await fetch("/api/bookings?date=" + viewDate);
    const list = await res.json();
    bookingsBySeat = {};
    list.forEach(b => {
      if (!bookingsBySeat[b.seat_id]) bookingsBySeat[b.seat_id] = [];
      bookingsBySeat[b.seat_id].push(b);
    });
  } catch(e) {
    bookingsBySeat = {};
  } finally {
    showGrid();
    renderGrid();
    scheduleAlarms();
    updateHeaderStatus();
    updateAutoBookButton();
  }
}

// ---------- 自動予約ボタンの状態更新 ----------
function updateAutoBookButton() {
  const user = getUser();
  const btn = document.getElementById("btn-auto-book");
  const all = Object.values(bookingsBySeat).flat();
  const mine = all.find(b => b.user === user && user !== "");
  if (mine) {
    btn.disabled = true;
    btn.textContent = "✅ 予約済み（席 " + mine.seat_id + "）";
  } else {
    btn.disabled = false;
    btn.textContent = "✨ 席を自動割り当てする";
  }
}

// ---------- ヘッダーステータス ----------
function updateHeaderStatus() {
  const user = getUser();
  const el = document.getElementById("header-status");
  if (!user) { el.textContent = "名前を入力して席を自動割り当てしてください"; return; }
  const all = Object.values(bookingsBySeat).flat();
  const mine = all.find(b => b.user === user);
  if (mine) {
    el.textContent = `席 ${mine.seat_id} を予約中 ${mine.start_time}〜${mine.end_time}`;
  } else {
    el.textContent = `${user} さん：希望を選んで「自動割り当て」を押してください`;
  }
}

// ---------- グリッド描画 ----------
function renderGrid() {
  const user = getUser();
  const now  = nowHHMM();
  const grid = document.getElementById("seat-grid");
  grid.innerHTML = "";

  SEATS.forEach(seat => {
    const list = bookingsBySeat[seat.id] || [];
    const current = list.find(b => b.start_time <= now && now < b.end_time);
    const mine = list.find(b => b.user === user && user !== "");
    const isCurrentlyTaken = !!current;
    const isMine = !!mine;
    const isMineNow = mine && mine.start_time <= now && now < mine.end_time;
    const isPrev = seat.id === yesterdaySeatId;

    const div = document.createElement("div");
    let cls = "seat";
    if (isMineNow) cls += " mine";
    else if (isMine) cls += " mine";
    else if (isPrev) cls += " prev";
    else if (isCurrentlyTaken) cls += " taken";
    div.className = cls;

    // 前日使用席はクリック無効（参照のみ）
    if (isMine) {
      div.onclick = () => openCancelModal(seat, mine);
    }

    const catName = CATEGORIES[seat.category] || seat.category;
    const catCls  = CAT_CLASS[seat.category] || "other";
    const tags = `<span class="badge ${catCls}">${catName}</span>`;

    const isToday = viewDate === todayISO();
    function bookingLine(b) {
      const isNowActive = isToday && b.start_time <= now && now < b.end_time;
      const isMineB     = b.user === user && user !== "";
      const color = isMineB ? "#7c3aed" : isNowActive ? "#dc2626" : "#f59e0b";
      const prefix = isNowActive ? "▶ " : "";
      return `<span style="color:${color};font-size:.72rem">${prefix}${b.start_time}〜${b.end_time} ${b.user}</span>`;
    }

    let statusBadge;
    if (isPrev) {
      statusBadge = `<span class="badge prev">前日使用</span>`;
    } else if (isMineNow) {
      statusBadge = `<span class="badge mine">自分</span>`;
    } else if (isMine) {
      statusBadge = `<span class="badge mine">自分（予約済）</span>`;
    } else if (isCurrentlyTaken) {
      statusBadge = `<span class="badge taken">使用中</span>`;
    } else if (list.length > 0) {
      statusBadge = `<span class="badge taken">予約あり</span>`;
    } else {
      statusBadge = `<span class="badge free">空き</span>`;
    }

    const infoLines = list.length > 0
      ? list.map(bookingLine).join("<br>")
      : isPrev ? "<span style='font-size:.72rem;color:#9a3412'>前日使用のため予約不可</span>"
      : "空き";

    div.innerHTML = `
      <div class="seat-num">席 ${seat.label}</div>
      <div class="seat-tags">${tags}${statusBadge}</div>
      <div class="seat-info" style="line-height:1.4">${infoLines}</div>
    `;
    grid.appendChild(div);
  });
}

// ---------- 自動予約 ----------
async function submitAutoBook() {
  const user = getUser();
  if (!user) { showToast("名前を入力してください"); return; }

  const startTime = document.getElementById("auto-start-time").value;
  const endTime   = document.getElementById("auto-end-time").value;
  if (!startTime) { showToast("開始時刻を入力してください"); return; }
  if (!endTime)   { showToast("終了時刻を入力してください"); return; }
  if (startTime >= endTime) { showToast("終了時刻は開始時刻より後にしてください"); return; }

  const btn = document.getElementById("btn-auto-book");
  btn.disabled = true;
  btn.textContent = "⏳ 割り当て中...";

  try {
    const res = await fetch("/api/auto_book", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        user,
        preference: currentPref,
        start_time: startTime,
        end_time: endTime,
        date: viewDate
      })
    });
    const data = await res.json();
    if (!res.ok) {
      showToast(data.error);
      updateAutoBookButton();
      return;
    }
    const seat = data.seat;
    const prefNames = { window: "窓際", no_phone: "電話なし", other: "おまかせ" };
    showToast(`✅ 席 ${seat.label} が割り当てられました（${prefNames[currentPref]}）`);
    await loadBookings();
  } catch(e) {
    showToast("エラーが発生しました");
    updateAutoBookButton();
  }
}

// ---------- キャンセルモーダル ----------
function openCancelModal(seat, booking) {
  selectedSeat    = seat;
  selectedBooking = booking;
  document.getElementById("cancel-info").textContent =
    `席 ${seat.label} の予約（${booking.start_time}〜${booking.end_time}）をキャンセルします`;
  document.getElementById("cancel-modal").classList.add("open");
}
function closeCancelModal() {
  document.getElementById("cancel-modal").classList.remove("open");
  selectedSeat    = null;
  selectedBooking = null;
}

async function submitCancel() {
  const res = await fetch("/api/cancel", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ seat_id: selectedSeat.id, user: getUser() })
  });
  const data = await res.json();
  if (!res.ok) { showToast(data.error); return; }

  closeCancelModal();
  showToast(`席 ${selectedSeat.label} の予約をキャンセルしました`);
  await loadBookings();
}

// ---------- アラーム ----------
const WARN_MINUTES = 5;
let alarmBooking = null;

function scheduleAlarms() {
  const user = getUser();
  if (!user) return;

  Object.values(alarmTimers).forEach(clearTimeout);
  alarmTimers = {};

  Object.values(bookingsBySeat).flat().forEach(b => {
    if (b.user !== user) return;
    const now = new Date();
    const [h, m] = b.end_time.split(":").map(Number);
    const end = new Date(); end.setHours(h, m, 0, 0);

    const warnAt = end - WARN_MINUTES * 60 * 1000;
    const warnDiff = warnAt - now;
    const endDiff  = end - now;

    if (warnDiff > 0) {
      alarmTimers["warn_" + b.seat_id] = setTimeout(() => triggerWarn(b), warnDiff);
    }
    if (endDiff > 0) {
      alarmTimers["end_" + b.seat_id] = setTimeout(() => triggerAlert(b), endDiff);
    }
  });
}

function triggerWarn(booking) {
  alarmBooking = booking;
  const banner = document.getElementById("alarm-banner");
  document.getElementById("alarm-message").textContent =
    `⚠️ 席 ${booking.seat_id} の予約終了まで残り${WARN_MINUTES}分です（〜${booking.end_time}）`;
  banner.className = "warn";
  beep(440, 0.3);
  notify("席予約 終了間近", `席 ${booking.seat_id} の予約終了まで残り${WARN_MINUTES}分です`);
}

function triggerAlert(booking) {
  alarmBooking = booking;
  const banner = document.getElementById("alarm-banner");
  document.getElementById("alarm-message").textContent =
    `🔔 席 ${booking.seat_id} の予約終了時刻になりました！延長するか席を開放してください`;
  banner.className = "alert";
  beep(880, 0.5);
  beep(880, 0.5, 0.6);
  notify("席予約 終了時刻", `席 ${booking.seat_id} の予約時間が終了しました`);
}

function dismissAlarm() {
  document.getElementById("alarm-banner").className = "";
}

function beep(freq, duration, delay = 0) {
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    osc.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + duration);
  } catch(e) {}
}

function notify(title, body) {
  if (Notification.permission === "granted") {
    new Notification(title, { body });
  }
}

// ---------- 延長モーダル ----------
function openExtendModal() {
  const b = alarmBooking || Object.values(bookingsBySeat).flat().find(b => b.user === getUser());
  if (!b) { showToast("延長する予約が見つかりません"); return; }
  alarmBooking = b;

  document.getElementById("extend-info").textContent =
    `席 ${b.seat_id} の現在の終了時刻：${b.end_time}`;
  const [h, m] = b.end_time.split(":").map(Number);
  const d = new Date(); d.setHours(h + 1, m, 0, 0);
  document.getElementById("extend-end-time").value = d.toTimeString().slice(0, 5);

  document.getElementById("extend-modal").classList.add("open");
}

function closeExtendModal() {
  document.getElementById("extend-modal").classList.remove("open");
}

function addMinutes(mins) {
  const input = document.getElementById("extend-end-time");
  const [h, m] = (input.value || "00:00").split(":").map(Number);
  const d = new Date(); d.setHours(h, m + mins, 0, 0);
  input.value = d.toTimeString().slice(0, 5);
}

async function submitExtend() {
  const user = getUser();
  const endTime = document.getElementById("extend-end-time").value;
  if (!endTime) { showToast("終了時刻を選択してください"); return; }
  if (!alarmBooking) { showToast("延長する予約が見つかりません"); return; }

  const res = await fetch("/api/extend", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ seat_id: alarmBooking.seat_id, user, end_time: endTime })
  });
  const data = await res.json();
  if (!res.ok) { showToast(data.error); return; }

  closeExtendModal();
  dismissAlarm();
  showToast(`席 ${alarmBooking.seat_id} を ${endTime} まで延長しました`);
  await loadBookings();
}

// ---------- Toast ----------
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}


// ---------- 初期化 ----------
// デフォルト時刻をセット（今から3時間）
(function initTimes() {
  const now = nowHHMM();
  document.getElementById("auto-start-time").value = now;
  document.getElementById("auto-end-time").value = addHHMM(now, 180);
})();

document.getElementById("user-input").addEventListener("input", () => {
  renderGrid();
  scheduleAlarms();
  updateHeaderStatus();
  updateAutoBookButton();
  // ユーザー変更時に前日席も再取得
  loadYesterdaySeat(getUser()).then(() => renderGrid());
});

if (Notification.permission === "default") {
  Notification.requestPermission();
}

(async () => {
  try {
    const res = await fetch("/api/seats");
    SEATS = await res.json();
  } catch(e) {}
  setViewDate(todayISO());
})();
setInterval(loadBookings, 30000);
</script>
